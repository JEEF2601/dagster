services:

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dagster-daemon:
    build: .
    command: >
      sh -c "if [ -d /opt/dagster/dagster_home/dagster.yaml ]; then rm -rf /opt/dagster/dagster_home/dagster.yaml; fi;
      cp /opt/dagster/app/dagster.yaml /opt/dagster/dagster_home/dagster.yaml;
      exec dagster-daemon run -m repo.repository"
    environment:
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
      DAGSTER_POSTGRES_HOST: ${DAGSTER_POSTGRES_HOST}
      DAGSTER_HOME: ${DAGSTER_HOME}
      SPARK_RUNNER_MODE: ${SPARK_RUNNER_MODE:-ssh}
      SPARK_SSH_HOST: ${SPARK_SSH_HOST}
      SPARK_SSH_USER: ${SPARK_SSH_USER}
      SPARK_SSH_PORT: ${SPARK_SSH_PORT}
      SPARK_SSH_IDENTITY_FILE: ${SPARK_SSH_IDENTITY_FILE}
      SPARK_REMOTE_JOBS_ROOT: ${SPARK_REMOTE_JOBS_ROOT}
      SPARK_JOBS_REPO_ROOT: ${SPARK_JOBS_REPO_ROOT}
    volumes:
      - dagster_home:/opt/dagster/dagster_home
    depends_on:
      - postgres

  dagster-webserver:
    build: .
    command: >
      sh -c "if [ -d /opt/dagster/dagster_home/dagster.yaml ]; then rm -rf /opt/dagster/dagster_home/dagster.yaml; fi;
      cp /opt/dagster/app/dagster.yaml /opt/dagster/dagster_home/dagster.yaml;
      exec dagster-webserver -h 0.0.0.0 -p 3000 -m repo.repository"
    ports:
      - "3000:3000"
    environment:
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
      DAGSTER_POSTGRES_HOST: ${DAGSTER_POSTGRES_HOST}
      DAGSTER_HOME: ${DAGSTER_HOME}
      SPARK_RUNNER_MODE: ${SPARK_RUNNER_MODE:-ssh}
      SPARK_SSH_HOST: ${SPARK_SSH_HOST}
      SPARK_SSH_USER: ${SPARK_SSH_USER}
      SPARK_SSH_PORT: ${SPARK_SSH_PORT}
      SPARK_SSH_IDENTITY_FILE: ${SPARK_SSH_IDENTITY_FILE}
      SPARK_REMOTE_JOBS_ROOT: ${SPARK_REMOTE_JOBS_ROOT}
      SPARK_JOBS_REPO_ROOT: ${SPARK_JOBS_REPO_ROOT}
    volumes:
      - dagster_home:/opt/dagster/dagster_home
    depends_on:
      - postgres

  dagster-webserver-readonly:
    build: .
    command: >
      sh -c "if [ -d /opt/dagster/dagster_home/dagster.yaml ]; then rm -rf /opt/dagster/dagster_home/dagster.yaml; fi;
      cp /opt/dagster/app/dagster.yaml /opt/dagster/dagster_home/dagster.yaml;
      exec dagster-webserver -h 0.0.0.0 -p 3001 -m repo.repository --read-only"
    ports:
      - "3001:3001"
    environment:
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
      DAGSTER_POSTGRES_HOST: ${DAGSTER_POSTGRES_HOST}
      DAGSTER_HOME: ${DAGSTER_HOME}
      SPARK_RUNNER_MODE: ${SPARK_RUNNER_MODE:-ssh}
      SPARK_SSH_HOST: ${SPARK_SSH_HOST}
      SPARK_SSH_USER: ${SPARK_SSH_USER}
      SPARK_SSH_PORT: ${SPARK_SSH_PORT}
      SPARK_SSH_IDENTITY_FILE: ${SPARK_SSH_IDENTITY_FILE}
      SPARK_REMOTE_JOBS_ROOT: ${SPARK_REMOTE_JOBS_ROOT}
      SPARK_JOBS_REPO_ROOT: ${SPARK_JOBS_REPO_ROOT}
    volumes:
      - dagster_home:/opt/dagster/dagster_home
    depends_on:
      - postgres

volumes:
  postgres_data:
  dagster_home:
