services:

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  dagster-daemon:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ETL_JOBS_GIT_URL: ${ETL_JOBS_GIT_URL:-https://github.com/JEEF2601/etl-jobs.git}
        ETL_JOBS_VERSION: ${ETL_JOBS_VERSION:-v0.1.0}
    networks:
      - default
      - etl_shared
    command: >
      sh -c "if [ -d /opt/dagster/dagster_home/dagster.yaml ]; then rm -rf /opt/dagster/dagster_home/dagster.yaml; fi;
      cp /opt/dagster/app/dagster.yaml /opt/dagster/dagster_home/dagster.yaml;
      exec dagster-daemon run -m repo.repository"
    environment:
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
      DAGSTER_POSTGRES_HOST: ${DAGSTER_POSTGRES_HOST}
      DAGSTER_HOME: ${DAGSTER_HOME}
      SPARK_RUNNER_MODE: ${SPARK_RUNNER_MODE:-local}
      SPARK_MASTER_URL: ${SPARK_MASTER_URL}
      SPARK_DEPLOY_MODE: ${SPARK_DEPLOY_MODE}
      SPARK_DRIVER_HOST: ${SPARK_DRIVER_HOST}
      SPARK_DRIVER_BIND_ADDRESS: ${SPARK_DRIVER_BIND_ADDRESS:-0.0.0.0}
      SPARK_PACKAGES: ${SPARK_PACKAGES:-org.apache.hadoop:hadoop-aws:3.4.1}
      SPARK_SUBMIT_CONF: ${SPARK_SUBMIT_CONF:-}
      SPARK_SSH_HOST: ${SPARK_SSH_HOST:-}
      SPARK_SSH_USER: ${SPARK_SSH_USER:-}
      SPARK_SSH_PORT: ${SPARK_SSH_PORT:-22}
      SPARK_SSH_IDENTITY_FILE: ${SPARK_SSH_IDENTITY_FILE:-}
      SPARK_REMOTE_JOBS_ROOT: ${SPARK_REMOTE_JOBS_ROOT:-/opt/spark-jobs}
      SPARK_JOBS_REPO_ROOT: ${SPARK_JOBS_REPO_ROOT:-/opt/dagster/app}
    volumes:
      - dagster_home:/opt/dagster/dagster_home
    env_file:
      - .env
    depends_on:
      - postgres

  dagster-webserver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ETL_JOBS_GIT_URL: ${ETL_JOBS_GIT_URL:-https://github.com/JEEF2601/etl-jobs.git}
        ETL_JOBS_VERSION: ${ETL_JOBS_VERSION:-v0.1.0}
    networks:
      - default
      - etl_shared
    command: >
      sh -c "if [ -d /opt/dagster/dagster_home/dagster.yaml ]; then rm -rf /opt/dagster/dagster_home/dagster.yaml; fi;
      cp /opt/dagster/app/dagster.yaml /opt/dagster/dagster_home/dagster.yaml;
      exec dagster-webserver -h 0.0.0.0 -p 3000 -m repo.repository"
    ports:
      - "3000:3000"
    environment:
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
      DAGSTER_POSTGRES_HOST: ${DAGSTER_POSTGRES_HOST}
      DAGSTER_HOME: ${DAGSTER_HOME}
      SPARK_RUNNER_MODE: ${SPARK_RUNNER_MODE:-local}
      SPARK_MASTER_URL: ${SPARK_MASTER_URL}
      SPARK_DEPLOY_MODE: ${SPARK_DEPLOY_MODE}
      SPARK_DRIVER_HOST: ${SPARK_DRIVER_HOST}
      SPARK_DRIVER_BIND_ADDRESS: ${SPARK_DRIVER_BIND_ADDRESS:-0.0.0.0}
      SPARK_PACKAGES: ${SPARK_PACKAGES:-org.apache.hadoop:hadoop-aws:3.4.1}
      SPARK_SUBMIT_CONF: ${SPARK_SUBMIT_CONF:-}
      SPARK_SSH_HOST: ${SPARK_SSH_HOST:-}
      SPARK_SSH_USER: ${SPARK_SSH_USER:-}
      SPARK_SSH_PORT: ${SPARK_SSH_PORT:-22}
      SPARK_SSH_IDENTITY_FILE: ${SPARK_SSH_IDENTITY_FILE:-}
      SPARK_REMOTE_JOBS_ROOT: ${SPARK_REMOTE_JOBS_ROOT:-/opt/spark-jobs}
      SPARK_JOBS_REPO_ROOT: ${SPARK_JOBS_REPO_ROOT:-/opt/dagster/app}
    volumes:
      - dagster_home:/opt/dagster/dagster_home
    env_file:
      - .env
    depends_on:
      - postgres

  dagster-webserver-readonly:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ETL_JOBS_GIT_URL: ${ETL_JOBS_GIT_URL:-https://github.com/JEEF2601/etl-jobs.git}
        ETL_JOBS_VERSION: ${ETL_JOBS_VERSION:-v0.1.0}
    networks:
      - default
      - etl_shared
    command: >
      sh -c "if [ -d /opt/dagster/dagster_home/dagster.yaml ]; then rm -rf /opt/dagster/dagster_home/dagster.yaml; fi;
      cp /opt/dagster/app/dagster.yaml /opt/dagster/dagster_home/dagster.yaml;
      exec dagster-webserver -h 0.0.0.0 -p 3001 -m repo.repository --read-only"
    ports:
      - "3001:3001"
    environment:
      DAGSTER_POSTGRES_USER: ${DAGSTER_POSTGRES_USER}
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD}
      DAGSTER_POSTGRES_DB: ${DAGSTER_POSTGRES_DB}
      DAGSTER_POSTGRES_HOST: ${DAGSTER_POSTGRES_HOST}
      DAGSTER_HOME: ${DAGSTER_HOME}
      SPARK_RUNNER_MODE: ${SPARK_RUNNER_MODE:-local}
      SPARK_MASTER_URL: ${SPARK_MASTER_URL}
      SPARK_DEPLOY_MODE: ${SPARK_DEPLOY_MODE}
      SPARK_DRIVER_HOST: ${SPARK_DRIVER_HOST}
      SPARK_DRIVER_BIND_ADDRESS: ${SPARK_DRIVER_BIND_ADDRESS:-0.0.0.0}
      SPARK_PACKAGES: ${SPARK_PACKAGES:-org.apache.hadoop:hadoop-aws:3.4.1}
      SPARK_SUBMIT_CONF: ${SPARK_SUBMIT_CONF:-}
      SPARK_SSH_HOST: ${SPARK_SSH_HOST:-}
      SPARK_SSH_USER: ${SPARK_SSH_USER:-}
      SPARK_SSH_PORT: ${SPARK_SSH_PORT:-22}
      SPARK_SSH_IDENTITY_FILE: ${SPARK_SSH_IDENTITY_FILE:-}
      SPARK_REMOTE_JOBS_ROOT: ${SPARK_REMOTE_JOBS_ROOT:-/opt/spark-jobs}
      SPARK_JOBS_REPO_ROOT: ${SPARK_JOBS_REPO_ROOT:-/opt/dagster/app}
    volumes:
      - dagster_home:/opt/dagster/dagster_home
    env_file:
      - .env
    depends_on:
      - postgres

networks:
  etl_shared:
    name: etl_shared

volumes:
  postgres_data:
  dagster_home:
