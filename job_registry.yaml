jobs:

  # --- Bronze: ingesta raw desde fuentes externas ---

  influx_cobre:
    entrypoint: bronze/influx_cobre.py
    description: Ingesta raw de datos de cobre desde InfluxDB hacia R2 (capa Bronze)
    spark:
      executor_instances: 1
      executor_memory: 1g
      driver_memory: 1g
      conf:
        spark.executor.cores: "1"
        spark.cores.max: "1"
    params:
      - date
      - bucket

  cryptocompare_to_r2:
    entrypoint: bronze/cryptocompare_to_r2.py
    description: Ingesta raw de precios BTC desde CryptoCompare hacia R2 (capa Bronze)
    spark:
      executor_instances: 1
      executor_memory: 1g
      driver_memory: 1g
      conf:
        spark.executor.cores: "1"
        spark.cores.max: "1"
    params: []

  # --- Gold: agregaciones y modelos analíticos ---

  daily_aggregation:
    entrypoint: gold/daily_aggregation.py
    description: Agregaciones diarias sobre datasets en R2 (capa Gold)
    spark:
      executor_instances: 1
      executor_memory: 1g
      driver_memory: 1g
      conf:
        spark.executor.cores: "1"
        spark.cores.max: "1"
    params:
      - date
